<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zola App - 30 Day Scripture Plans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500;700&family=Syne:wght@700;800&family=Cinzel:wght@400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:#07091A;font-family:'DM Sans',sans-serif;}

:root{
  --sp:#7B4FD4;
  --sp2:#A78BFA;
  --sp-pale:rgba(123,79,212,0.12);
  --sp-glow:rgba(123,79,212,0.32);
  --gold:#FFD700;
  --t1:#1A1E2E;
  --t2:#3D4460;
  --t3:#7A82A8;
  --t4:#C0C8E8;
}

body{background:#07091A;}

#app{
  position:relative;
  width:100%;
  max-width:430px;
  height:100%;
  margin:0 auto;
  background:radial-gradient(ellipse at 50% 0%,rgba(100,60,200,0.48) 0%,transparent 58%),radial-gradient(ellipse at 12% 82%,rgba(196,120,32,0.20) 0%,transparent 45%),linear-gradient(165deg,#07091A 0%,#0D1B3E 42%,#13113A 72%,#0A1628 100%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* STATUS BAR */
#sbar{
  flex-shrink:0;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:10;
  background:rgba(7,9,26,0.92);
  backdrop-filter:blur(12px);
}

.sbar-time{
  font-family:'DM Mono',monospace;
  font-size:14px;
  font-weight:800;
  color:rgba(255,255,255,0.92);
}

.sbar-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.sbar-btn{
  padding:4px 12px;
  border-radius:100px;
  border:1px solid rgba(123,79,212,0.30);
  background:rgba(123,79,212,0.12);
  font-size:10px;
  font-weight:800;
  color:var(--sp2);
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
}

.sbar-btn:active{transform:scale(0.92);}

/* ACTION BAR */
#action-bar{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:rgba(7,9,26,0.88);
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(8px);
}

.ab-lbl{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  margin-right:auto;
  font-weight:800;
}

.ab-btn{
  display:flex;
  align-items:center;
  gap:4px;
  padding:4px 11px;
  border-radius:100px;
  border:1.5px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.05);
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:800;
  color:rgba(255,255,255,0.65);
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}

.ab-btn:hover{border-color:var(--sp2);color:var(--sp2);}
.ab-btn:active{transform:scale(0.90);}

/* MAIN CONTENT */
#spirit-main{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding-bottom:20px;
  position:relative;
  z-index:1;
}

#spirit-main::-webkit-scrollbar{display:none;}

/* HEADER */
.sp-hdr{
  padding:18px 16px 8px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
}

.sp-title{
  font-family:'Syne',sans-serif;
  font-size:32px;
  font-weight:800;
  color:#E8E4FF;
  line-height:1.1;
  letter-spacing:-0.5px;
}

.sp-sub{
  font-size:12px;
  color:rgba(200,190,255,0.60);
  margin-top:5px;
  font-weight:700;
  letter-spacing:0.5px;
}

/* PLAN SELECTOR */
.plan-selector{
  display:flex;
  gap:8px;
  margin:12px 14px;
  padding:8px;
  background:rgba(123,79,212,0.08);
  border-radius:14px;
  border:1px solid rgba(123,79,212,0.20);
}

.plan-tab{
  flex:1;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid transparent;
  background:transparent;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:800;
  color:rgba(200,190,255,0.65);
  cursor:pointer;
  transition:all 0.3s;
  text-align:center;
}

.plan-tab.active{
  background:linear-gradient(135deg,var(--sp),var(--sp2));
  color:#fff;
  border-color:var(--sp2);
}

/* VERSE CARD */
.sp-verse-card{
  margin:4px 14px 10px;
  border-radius:22px;
  background:linear-gradient(145deg,rgba(255,255,255,0.055),rgba(255,255,255,0.02));
  border:1px solid rgba(123,79,212,0.30);
  padding:18px 16px;
  position:relative;
  overflow:hidden;
}

.sp-verse-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 78% 18%,rgba(123,79,212,0.20),transparent 60%);
  pointer-events:none;
}

.verse-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(200,190,255,0.65);
  margin-bottom:10px;
  position:relative;
  z-index:1;
  font-weight:800;
}

.verse-day{
  font-family:'Syne',sans-serif;
  font-size:24px;
  font-weight:800;
  color:var(--sp2);
  margin-bottom:12px;
  position:relative;
  z-index:1;
  letter-spacing:-0.3px;
}

.sp-verse-text{
  font-family:'Syne',sans-serif;
  font-size:16px;
  color:rgba(240,236,255,0.95);
  line-height:2;
  position:relative;
  z-index:1;
  font-style:normal;
  font-weight:800;
}

.sp-verse-ref{
  font-family:'Playfair Display',serif;
  font-size:12px;
  color:var(--sp2);
  margin-top:14px;
  position:relative;
  z-index:1;
  font-weight:500;
  letter-spacing:0.3px;
  font-style:italic;
}

.sp-verse-btns{
  margin-top:11px;
  position:relative;
  z-index:1;
  display:flex;
  gap:7px;
  flex-wrap:wrap;
}

.sp-vbtn{
  padding:6px 14px;
  border-radius:100px;
  border:1px solid rgba(123,79,212,0.30);
  background:rgba(123,79,212,0.12);
  font-size:11px;
  font-weight:800;
  color:var(--sp2);
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
}

.sp-vbtn:active{transform:scale(0.90);}
.sp-vbtn-fav.active{background:rgba(232,84,122,0.25);}

/* SECTIONS */
.sp-sec{
  margin:0 14px 10px;
  position:relative;
  z-index:1;
}

.sp-sec-lbl{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(200,190,255,0.50);
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  user-select:none;
  font-weight:800;
}

.sp-sec-lbl-line{
  flex:1;
  height:1px;
  background:rgba(255,255,255,0.06);
}

.sp-sec-lbl .sp-chev{
  font-size:9px;
  color:rgba(200,190,255,0.38);
  transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);
  flex-shrink:0;
}

.sp-sec.collapsed .sp-chev{
  transform:rotate(-90deg);
}

.sp-sec-body{
  overflow:hidden;
  max-height:1000px;
  transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1),opacity 0.28s ease;
  opacity:1;
}

.sp-sec.collapsed .sp-sec-body{
  max-height:0!important;
  opacity:0;
}

/* PRAYER LIST */
.sp-prayer-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 13px;
  border-radius:15px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(123,79,212,0.16);
  cursor:pointer;
  transition:all 0.22s;
  margin-bottom:6px;
}

.sp-prayer-item.prayed{
  background:rgba(123,79,212,0.13);
  border-color:rgba(123,79,212,0.32);
}

.sp-p-chk{
  width:22px;
  height:22px;
  border-radius:7px;
  border:2px solid rgba(123,79,212,0.42);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  flex-shrink:0;
  transition:all 0.22s;
  color:#fff;
}

.sp-prayer-item.prayed .sp-p-chk{
  background:var(--sp);
  border-color:var(--sp);
}

.sp-prayer-item.prayed .sp-p-chk::after{
  content:'✓';
}

.sp-p-text{
  font-size:12.5px;
  font-weight:700;
  color:rgba(230,225,255,0.88);
  flex:1;
  line-height:1.4;
}

.sp-prayer-item.prayed .sp-p-text{
  color:rgba(160,150,200,0.55);
  text-decoration:line-through;
}

.sp-add-prayer-btn{
  width:100%;
  padding:10px;
  border:1.5px dashed rgba(123,79,212,0.22);
  border-radius:14px;
  background:none;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  color:rgba(200,190,255,0.48);
  cursor:pointer;
  margin-top:5px;
  transition:all 0.2s;
  font-weight:700;
}

.sp-add-prayer-btn:hover{
  border-color:var(--sp2);
  color:var(--sp2);
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.modal.open{
  display:flex;
}

.modal-content{
  background:linear-gradient(135deg,rgba(26,30,46,0.95),rgba(61,68,96,0.85));
  border:1px solid rgba(123,79,212,0.30);
  border-radius:20px;
  padding:24px;
  max-width:320px;
  width:90%;
  max-height:80vh;
  overflow-y:auto;
}

.modal-title{
  font-family:'Syne',sans-serif;
  font-size:20px;
  font-weight:800;
  color:#E8E4FF;
  margin-bottom:16px;
  letter-spacing:-0.3px;
}

.modal-input{
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(123,79,212,0.30);
  background:rgba(123,79,212,0.12);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  color:rgba(240,236,255,0.95);
  margin-bottom:12px;
  resize:vertical;
  min-height:60px;
  font-weight:600;
}

.modal-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--sp2);
  background:linear-gradient(135deg,var(--sp),var(--sp2));
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:800;
  color:#fff;
  cursor:pointer;
  transition:all 0.2s;
}

.modal-btn:active{
  transform:scale(0.95);
}

.modal-close{
  float:right;
  font-size:20px;
  cursor:pointer;
  color:rgba(200,190,255,0.50);
}

/* DECLARATION ENTRY */
.sp-declaration-entry{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px;
  border-radius:16px;
  background:linear-gradient(145deg,rgba(123,79,212,0.10),rgba(100,60,200,0.06));
  border:1px solid rgba(123,79,212,0.22);
  cursor:pointer;
  transition:all 0.22s;
  margin-bottom:8px;
  position:relative;
}

.sp-declaration-entry::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 100% 0%,rgba(123,79,212,0.12),transparent 70%);
}

.sp-decl-avatar{
  width:32px;
  height:32px;
  border-radius:10px;
  background:linear-gradient(135deg,rgba(255,220,100,0.30),rgba(123,79,212,0.25));
  border:1.5px solid rgba(123,79,212,0.25);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  flex-shrink:0;
  position:relative;
  z-index:1;
}

.sp-decl-content{
  flex:1;
  position:relative;
  z-index:1;
}

.sp-decl-text{
  font-size:12.5px;
  color:rgba(230,225,255,0.90);
  line-height:1.6;
  font-weight:700;
}

.sp-decl-date{
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:rgba(200,190,255,0.50);
  margin-top:5px;
  font-weight:700;
}

/* PLAN GRID */
.plan-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:0 14px 10px;
  margin:0;
}

.plan-day{
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(123,79,212,0.20);
  background:rgba(123,79,212,0.08);
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
}

.plan-day:hover{
  border-color:var(--sp2);
  background:rgba(123,79,212,0.15);
}

.plan-day.completed{
  background:rgba(123,79,212,0.25);
  border-color:var(--sp2);
}

.plan-day-num{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:rgba(200,190,255,0.65);
  margin-bottom:5px;
  font-weight:800;
}

.plan-day-verse{
  font-family:'Playfair Display',serif;
  font-size:10px;
  color:rgba(240,236,255,0.85);
  line-height:1.4;
  font-style:italic;
  font-weight:600;
}

.plan-day.completed::after{
  content:'✓';
  position:absolute;
  top:4px;
  right:6px;
  font-size:12px;
  color:var(--sp2);
}

/* VERSE COLOR SWATCHES */
.verse-color-swatches{
  display:flex;
  gap:8px;
  margin-top:14px;
  position:relative;
  z-index:1;
  flex-wrap:wrap;
}

.color-swatch{
  width:28px;
  height:28px;
  border-radius:8px;
  border:2px solid rgba(255,255,255,0.20);
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.color-swatch:hover{
  transform:scale(1.1);
  border-color:rgba(255,255,255,0.60);
}

.color-swatch.active{
  border-color:#fff;
  box-shadow:0 0 12px currentColor;
}

.pdf-export-btn{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(123,79,212,0.30);
  background:linear-gradient(135deg,rgba(123,79,212,0.20),rgba(123,79,212,0.10));
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  font-weight:800;
  color:var(--sp2);
  cursor:pointer;
  transition:all 0.2s;
  margin-top:12px;
}

.pdf-export-btn:hover{
  background:linear-gradient(135deg,rgba(123,79,212,0.30),rgba(123,79,212,0.20));
  border-color:var(--sp2);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(123,79,212,0.30);
  border:1px solid var(--sp2);
  border-radius:12px;
  padding:12px 20px;
  font-size:12px;
  color:#fff;
  font-weight:600;
  z-index:10000;
  animation:slideUp 0.3s ease-out;
}

@keyframes slideUp{
  from{transform:translateX(-50%) translateY(20px);opacity:0;}
  to{transform:translateX(-50%) translateY(0);opacity:1;}
}
</style>
</head>
<body>
<div id="app">
  <div id="sbar">
    <div class="sbar-time" id="time-display">12:00</div>
    <div class="sbar-right">
      <button class="sbar-btn" onclick="clearAllData()">Reset</button>
    </div>
  </div>

  <div id="action-bar">
  </div>

  <div id="spirit-main">
    <div class="sp-hdr">
      <div>
        <div class="sp-title">Zola App</div>
        <div class="sp-sub">30-Day Scripture Plans</div>
      </div>
    </div>

    <!-- PLAN SELECTOR -->
    <div class="plan-selector">
      <button class="plan-tab active" onclick="switchPlan('love')">God's Love</button>
      <button class="plan-tab" onclick="switchPlan('identity')">Who I Am</button>
    </div>

    <!-- VERSE OF THE DAY -->
    <div class="sp-verse-card">
      <div class="verse-label">Today's Verse</div>
      <div class="verse-day" id="verse-day">Day 1</div>
      <div class="sp-verse-text" id="verse-text">Loading...</div>
      <div class="sp-verse-ref" id="verse-ref"></div>
      
      <!-- COLOR SWATCHES -->
      <div class="verse-color-swatches" id="color-swatches"></div>
      
      <!-- PDF EXPORT BUTTON -->
      <button class="pdf-export-btn" onclick="downloadScroll()">📜 Share as Scroll</button>
      
      <div class="sp-verse-btns">
        <button class="sp-vbtn" onclick="favoriteVerse()">❤ Mark</button>
        <button class="sp-vbtn" onclick="shareVerse()">📤 Share</button>
      </div>
    </div>

    <!-- 30 DAY PLAN GRID -->
    <div class="sp-sec">
      <div class="sp-sec-lbl" onclick="toggleSection(event)">
        <span>📖 30-Day Plan</span>
        <div class="sp-sec-lbl-line"></div>
        <span class="sp-chev">›</span>
      </div>
      <div class="sp-sec-body">
        <div class="plan-grid" id="plan-grid"></div>
      </div>
    </div>

    <!-- PRAYERS SECTION -->
    <div class="sp-sec">
      <div class="sp-sec-lbl" onclick="toggleSection(event)">
        <span>🙏 Prayers</span>
        <div class="sp-sec-lbl-line"></div>
        <span class="sp-chev">›</span>
      </div>
      <div class="sp-sec-body">
        <div style="margin:12px 2px;position:relative;z-index:1;">
          <div id="prayer-list"></div>
          <button class="sp-add-prayer-btn" onclick="openAddPrayerModal()">+ Add Prayer</button>
        </div>
      </div>
    </div>

    <!-- DECLARATIONS SECTION -->
    <div class="sp-sec">
      <div class="sp-sec-lbl" onclick="toggleSection(event)">
        <span>💬 Declarations</span>
        <div class="sp-sec-lbl-line"></div>
        <span class="sp-chev">›</span>
      </div>
      <div class="sp-sec-body">
        <div style="margin:12px 2px;position:relative;z-index:1;">
          <div id="declarations-list"></div>
          <button class="sp-add-prayer-btn" onclick="openAddDeclarationModal()">+ Add Declaration</button>
        </div>
      </div>
    </div>

    <!-- GRATITUDE SECTION -->
    <div class="sp-sec">
      <div class="sp-sec-lbl" onclick="toggleSection(event)">
        <span>✨ Gratitude</span>
        <div class="sp-sec-lbl-line"></div>
        <span class="sp-chev">›</span>
      </div>
      <div class="sp-sec-body">
        <div style="margin:12px 2px;position:relative;z-index:1;">
          <div id="gratitude-list"></div>
          <button class="sp-add-prayer-btn" onclick="openAddGratitudeModal()">+ Add Entry</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD PRAYER MODAL -->
<div id="prayer-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closePrayerModal()">&times;</span>
    <div class="modal-title">Add Prayer</div>
    <textarea class="modal-input" id="prayer-input" placeholder="Write your prayer..."></textarea>
    <button class="modal-btn" onclick="savePrayer()">Add Prayer</button>
  </div>
</div>

<!-- ADD DECLARATION MODAL -->
<div id="declaration-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeDeclarationModal()">&times;</span>
    <div class="modal-title">Add Declaration</div>
    <textarea class="modal-input" id="declaration-input" placeholder="Write your declaration..."></textarea>
    <button class="modal-btn" onclick="saveDeclaration()">Add Declaration</button>
  </div>
</div>

<!-- ADD GRATITUDE MODAL -->
<div id="gratitude-modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeGratitudeModal()">&times;</span>
    <div class="modal-title">Add Gratitude</div>
    <textarea class="modal-input" id="gratitude-input" placeholder="What are you grateful for?"></textarea>
    <button class="modal-btn" onclick="saveGratitude()">Add Entry</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// 30-DAY SCRIPTURE PLANS
// ═══════════════════════════════════════════════════════════════════════════

const SCRIPTURE_PLANS = {

function init() {
  loadData();
  updateTime();
  setInterval(updateTime, 1000);
  renderVerseOfDay();
  renderPlanGrid();
  renderPrayers();
  renderDeclarations();
  renderGratitude();
}

function loadData() {
  const saved = localStorage.getItem('spiritAppData');
  if (saved) {
    const data = JSON.parse(saved);
    prayers = data.prayers || [];
    declarations = data.declarations || [];
    gratitude = data.gratitude || [];
    favoriteVerses = data.favoriteVerses || [];
    completedDays = data.completedDays || {};
    currentPlan = data.currentPlan || 'love';
    verseTextColor = data.verseTextColor || '#E8E4FF';
  }
}

function saveData() {
  const data = {
    prayers,
    declarations,
    gratitude,
    favoriteVerses,
    completedDays,
    currentPlan,
    verseTextColor
  };
  localStorage.setItem('spiritAppData', JSON.stringify(data));
}

// ═══════════════════════════════════════════════════════════════════════════
// PLAN & VERSE LOGIC
// ═══════════════════════════════════════════════════════════════════════════

function switchPlan(plan) {
  currentPlan = plan;
  saveData();
  document.querySelectorAll('.plan-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  renderVerseOfDay();
  renderPlanGrid();
}

function getCurrentDay() {
  // Get day of year to align with 30-day cycles
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  return ((dayOfYear % 30) || 30); // 1-30 cycling
}

function renderVerseOfDay() {
  const day = getCurrentDay();
  const plan = SCRIPTURE_PLANS[currentPlan];
  const verse = plan.verses[day - 1];
  
  document.getElementById('verse-day').textContent = `Day ${day} of 30`;
  document.getElementById('verse-text').textContent = verse.text;
  document.getElementById('verse-text').style.color = verseTextColor;
  document.getElementById('verse-ref').textContent = verse.ref;
  
  renderColorSwatches();
}

function renderColorSwatches() {
  const container = document.getElementById('color-swatches');
  container.innerHTML = '';
  
  VERSE_COLORS.forEach((color) => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.style.backgroundColor = color.hex;
    
    if (color.hex === verseTextColor) {
      swatch.classList.add('active');
    }
    
    swatch.onclick = () => changeVerseColor(color.hex);
    swatch.title = color.name;
    container.appendChild(swatch);
  });
}

function changeVerseColor(color) {
  verseTextColor = color;
  const verseText = document.getElementById('verse-text');
  verseText.style.color = color;
  renderColorSwatches();
}

function renderPlanGrid() {
  const plan = SCRIPTURE_PLANS[currentPlan];
  const grid = document.getElementById('plan-grid');
  const currentDay = getCurrentDay();
  
  grid.innerHTML = '';
  
  plan.verses.forEach((verse) => {
    const dayEl = document.createElement('div');
    dayEl.className = 'plan-day';
    
    if (completedDays[`${currentPlan}-${verse.day}`]) {
      dayEl.classList.add('completed');
    }
    
    dayEl.innerHTML = `
      <div class="plan-day-num">Day ${verse.day}</div>
      <div class="plan-day-verse">${verse.ref}</div>
    `;
    
    dayEl.onclick = () => toggleDayComplete(verse.day);
    grid.appendChild(dayEl);
  });
}

function toggleDayComplete(day) {
  const key = `${currentPlan}-${day}`;
  completedDays[key] = !completedDays[key];
  saveData();
  renderPlanGrid();
  showToast(completedDays[key] ? '✓ Day marked complete!' : 'Day unmarked');
}

function openAddPrayerModal() {
  document.getElementById('prayer-modal').classList.add('open');
}

function closePrayerModal() {
  document.getElementById('prayer-modal').classList.remove('open');
  document.getElementById('prayer-input').value = '';
}

function savePrayer() {
  const text = document.getElementById('prayer-input').value.trim();
  if (!text) {
    showToast('Please enter a prayer');
    return;
  }
  
  prayers.push({
    id: Date.now(),
    text,
    date: new Date().toLocaleDateString(),
    prayed: false
  });
  
  saveData();
  renderPrayers();
  closePrayerModal();
  showToast('Prayer added 🙏');
}

function togglePrayer(id) {
  const prayer = prayers.find(p => p.id === id);
  if (prayer) {
    prayer.prayed = !prayer.prayed;
    saveData();
    renderPrayers();
  }
}

function renderPrayers() {
  const list = document.getElementById('prayer-list');
  list.innerHTML = '';
  
  prayers.slice().reverse().forEach((prayer) => {
    const item = document.createElement('div');
    item.className = `sp-prayer-item ${prayer.prayed ? 'prayed' : ''}`;
    item.innerHTML = `
      <div class="sp-p-chk" onclick="togglePrayer(${prayer.id})"></div>
      <div class="sp-p-text">${escapeHtml(prayer.text)}</div>
    `;
    list.appendChild(item);
  });
}

function updateTime() {
  const now = new Date();
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time-display').textContent = `${hours}:${minutes}`;
}

function toggleSection(event) {
  const section = event.target.closest('.sp-sec');
  section.classList.toggle('collapsed');
}

function favoriteVerse() {
  const ref = document.getElementById('verse-ref').textContent;
  if (!favoriteVerses.includes(ref)) {
    favoriteVerses.push(ref);
    saveData();
    showToast('❤ Verse favorited!');
    event.target.classList.add('active');
  }
}

function shareVerse() {
  const text = document.getElementById('verse-text').textContent;
  const ref = document.getElementById('verse-ref').textContent;
  const message = `"${text}" - ${ref}`;
  
  if (navigator.share) {
    navigator.share({
      title: 'Scripture Verse',
      text: message
    });
  } else {
    navigator.clipboard.writeText(message);
    showToast('Verse copied to clipboard!');
  }
}

  <circle cx="650" cy="940" r="25" fill="#8b7355"/>

    console.log('SVG created, length:', svg.length);
    
    // Create blob
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    console.log('Blob created:', blob.size);
    
    // Create URL
    const url = URL.createObjectURL(blob);
    console.log('URL created:', url);
    
    // Create and click link
    const link = document.createElement('a');
    link.href = url;
    link.download = 'zola-verse-scroll.svg';
    
    document.body.appendChild(link);
    console.log('Link appended');
    
    link.click();
    console.log('Link clicked');
    
    setTimeout(() => {
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      console.log('Cleanup done');
    }, 100);
    
    showToast('📜 Scroll downloaded!');
    
  } catch (error) {
    console.error('Full error:', error);
    console.error('Error message:', error.message);
    console.error('Error stack:', error.stack);
    showToast('Error - check console');
  }
}

function escapeXmlSpecialChars(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.remove();
  }, 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function clearAllData() {
  if (confirm('Are you sure you want to reset all data? This cannot be undone.')) {
    localStorage.removeItem('spiritAppData');
    prayers = [];
    declarations = [];
    gratitude = [];
    favoriteVerses = [];
    completedDays = {};
    init();
    showToast('Data reset ↻');
  }
}

// Initialize on page load
window.addEventListener('DOMContentLoaded', init);
